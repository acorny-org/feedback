name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion! Please describe the feature you'd like to see — it helps us make Acorny better.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like Acorny to have
      placeholder: "e.g. Support exporting highlights as Markdown files"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: In what situation would you need this feature
      placeholder: "e.g. When writing reading notes, I need to organize highlights from Acorny into Obsidian"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you ideally like this feature to work (optional)
      placeholder: "e.g. Add an 'Export' button in the popup with format options (Markdown / JSON)"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: How are you currently working around this need (optional)
      placeholder: "e.g. I manually copy and paste highlights into my note-taking app"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Mockups
      description: Any screenshots or sketches that help illustrate your idea (optional)
      placeholder: Drag and drop images here to upload
