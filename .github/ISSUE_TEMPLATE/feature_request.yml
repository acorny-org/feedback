name: 💡 功能建议
description: 提出一个新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望的功能，帮助我们让 Acorny 变得更好。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望 Acorny 增加什么功能
      placeholder: 例：支持导出高亮为 Markdown 文件
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 什么情况下你需要这个功能
      placeholder: 例：我在写读书笔记时，需要把 Acorny 中的高亮整理到 Obsidian 中
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 期望方案
      description: 你理想中这个功能怎么运作（可选）
      placeholder: 例：在扩展弹窗中增加「导出」按钮，支持选择格式（Markdown / JSON）

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 目前你是怎么绕过这个需求的（可选）
      placeholder: 例：目前我手动复制粘贴高亮内容到笔记软件

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 原型
      description: 有助于理解的截图或草图（可选）
      placeholder: 拖拽图片到此处上传
