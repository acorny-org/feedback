name: "\U0001F41B Bug Report"
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible to help us locate and fix the issue faster.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Briefly describe the problem you encountered
      placeholder: "e.g. After clicking 'Start Review', the page goes blank and the review interface doesn't load"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Describe step by step how to reproduce the issue
      placeholder: |
        1. Open the extension popup
        2. Click 'Start Review'
        3. Page goes blank
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen
      placeholder: "e.g. Should enter the review interface and display highlight cards"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "e.g. Blank page, console shows TypeError"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: If possible, attach screenshots or a screen recording to help us understand the issue
      placeholder: Drag and drop images here to upload

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Arc
        - Other (please specify in additional info)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Extension Version
      description: You can find this on the extensions page (chrome://extensions)
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Info
      description: Any other information you think might be helpful (e.g. console errors, browser version)
